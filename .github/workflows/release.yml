name: Release

on:
  push:
    branches: [main]

# Required by changesets/action: write to repo for tags + GitHub releases.
permissions:
  contents: write
  # Enables npm provenance attestations on `npm publish` (recommended; harmless if unused).
  id-token: write

# Never cancel an in-flight release; queue subsequent pushes instead.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history is required so changesets can compute the version diff.
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          # registry-url is required so setup-node writes the npm auth token.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Single-PR release flow: contributors apply versions in-PR by running
      # `pnpm version-packages` before merge. The action below only publishes —
      # it does NOT open a Version Packages PR. (That alternative flow needs the
      # repo's "Allow GitHub Actions to create and approve pull requests"
      # setting enabled, which we don't rely on.)
      #
      # `changeset publish` is a no-op when no package needs publishing, so this
      # is safe to run on every push to main, including non-version commits.
      - name: Publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
