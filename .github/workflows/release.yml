name: Release

on:
  push:
    branches: [main]

# Required by changesets/action: write to repo (commits, tags, releases) and PRs.
permissions:
  contents: write
  pull-requests: write
  # Enables npm provenance attestations on `npm publish` (recommended; harmless if unused).
  id-token: write

# Never cancel an in-flight release; queue subsequent pushes instead.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history is required so changesets can compute the version diff.
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          # registry-url is required so setup-node writes the npm auth token.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist on main: opens/updates the "Version Packages" PR.
          # When the most recent commit on main is the merged "Version Packages" PR: runs publish.
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
