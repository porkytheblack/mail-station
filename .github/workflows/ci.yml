name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify dist entry points exist
        run: |
          test -f packages/mailbox-station/dist/index.js
          test -f packages/mailbox-station/dist/index.d.ts
          test -f packages/mailbox-station/dist/effect.js
          test -f packages/mailbox-station/dist/effect.d.ts
          test -f packages/gmail-station/dist/index.js
          test -f packages/gmail-station/dist/index.d.ts
          test -f packages/gmail-station/dist/effect.js
          test -f packages/gmail-station/dist/effect.d.ts
          test -f packages/mailbox-station-conformance/dist/index.js
          test -f packages/mailbox-station-conformance/dist/index.d.ts

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  lint-lockfile:
    name: Lockfile up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  conformance-sqlite:
    name: SQLite Store conformance battery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run only the SQLite store conformance suite
        run: pnpm exec vitest run examples/basic-sqlite/src/sqlite-store.test.ts
